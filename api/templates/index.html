<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rag-psych — clinical RAG demo</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.169.0/build/three.module.js" } }
  </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen overflow-x-hidden">

  <!-- Three.js neural-particle canvas (subtle, behind everything) -->
  <canvas id="neural-bg" class="fixed inset-0 w-full h-full -z-10 opacity-50"></canvas>

  <main class="relative max-w-6xl mx-auto px-6 py-10">

    <!-- Hero -->
    <header class="mb-12 text-center relative" id="hero">
      <a href="/help"
         class="absolute top-0 right-0 text-slate-500 hover:text-cyan-300 transition-colors text-xs uppercase tracking-widest">
        help
      </a>
      <h1 class="text-5xl font-light tracking-tight mb-3">
        <span class="text-cyan-300">rag</span><span class="text-slate-400">-</span><span class="text-fuchsia-300">psych</span>
      </h1>
      <p class="text-slate-400 text-sm uppercase tracking-widest">
        clinical retrieval-augmented generation · mtsamples · pubmed · icd-11
      </p>
    </header>

    <!-- Search form -->
    <form id="search-form"
          hx-post="/ui/query"
          hx-target="#results"
          hx-swap="innerHTML"
          hx-indicator="#spinner"
          class="mb-10">
      <div class="flex items-stretch gap-3 bg-slate-900/70 backdrop-blur rounded-2xl border border-slate-800 p-2 shadow-xl shadow-cyan-500/5">
        <input
          type="text"
          name="query"
          id="query-input"
          placeholder="Ask a clinical question — e.g. criteria for generalized anxiety disorder"
          maxlength="2000"
          required
          class="flex-1 bg-transparent text-slate-100 placeholder-slate-500 px-4 py-3 focus:outline-none text-lg" />
        <select name="k"
                class="bg-slate-800 text-slate-300 text-sm rounded-xl px-3 focus:outline-none border border-slate-700">
          <option value="3">k=3</option>
          <option value="5" selected>k=5</option>
          <option value="8">k=8</option>
          <option value="10">k=10</option>
        </select>
        <button type="submit"
                class="bg-gradient-to-r from-cyan-500 to-fuchsia-500 text-slate-950 font-semibold px-6 py-3 rounded-xl hover:scale-[1.02] active:scale-[0.98] transition-transform">
          search
        </button>
      </div>
    </form>

    <!-- Loading indicator -->
    <div id="spinner" class="htmx-indicator flex items-center justify-center py-16">
      <div class="flex gap-2 items-center">
        <span class="block w-3 h-3 bg-cyan-400 rounded-full pulse-dot"></span>
        <span class="block w-3 h-3 bg-fuchsia-400 rounded-full pulse-dot" style="animation-delay: 0.2s"></span>
        <span class="block w-3 h-3 bg-cyan-400 rounded-full pulse-dot" style="animation-delay: 0.4s"></span>
        <span class="ml-3 text-slate-400 text-sm uppercase tracking-widest">retrieving · reranking · generating</span>
      </div>
    </div>

    <!-- HTMX swap target -->
    <section id="results" class="min-h-[200px]"></section>

    <footer class="mt-20 text-xs text-slate-600 text-center">
      portfolio demo · no PHI · pgvector + S-PubMedBert + RRF + ms-marco-MiniLM rerank
    </footer>
  </main>

  <script type="module" src="/static/app.js"></script>
  <script type="module" src="/static/animations.js"></script>
</body>
</html>
